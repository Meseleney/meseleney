<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Meseleney</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #0b0f1a, #1a1033);
    display: flex;
    justify-content: center;
    height: 100vh;
    overflow: hidden;
    color: white;
}

body::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background:
        radial-gradient(circle at 20% 20%, rgba(255, 0, 150, 0.2), transparent 40%),
        radial-gradient(circle at 80% 40%, rgba(0, 255, 255, 0.2), transparent 45%),
        radial-gradient(circle at 50% 80%, rgba(255, 255, 0, 0.1), transparent 50%);
    pointer-events: none;
}

.container {
    width: 800px;
    display: flex;
    flex-direction: column;
    height: 100vh;
}

.header {
    text-align: center;
    padding: 15px;
    font-size: 24px;
    font-weight: bold;
    color: #ffea00;
    text-shadow: 2px 2px 0px black;
}

.chat {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.msg {
    padding: 12px;
    border-radius: 14px;
    max-width: 75%;
    animation: pop 0.2s ease;
}

@keyframes pop {
    from { transform: scale(0.9); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
}

.user {
    align-self: flex-end;
    background: #ff006e;
    color: white;
    border: 3px solid black;
}

.bot {
    align-self: flex-start;
    background: #00f5d4;
    color: black;
    border: 3px solid black;
}

.input-area {
    display: flex;
    padding: 15px;
    gap: 10px;
}

input {
    flex: 1;
    padding: 12px;
    border-radius: 10px;
    border: 3px solid black;
}

button {
    padding: 12px 18px;
    border: 3px solid black;
    background: #ffea00;
    cursor: pointer;
    font-weight: bold;
}

button:active {
    transform: scale(0.95);
}
</style>

</head>

<body>

<div class="container">

    <div class="header">🎭 Meseleney </div>

    <div id="chat" class="chat"></div>

    <div class="input-area">
        <input id="msg" placeholder="Bir şey yaz..." />
        <button onclick="send()">Gönder</button>
    </div>

</div>

<script>

function randomBorder() {
    const colors = ["#ffea00", "#00f5d4", "#ff006e", "#a3ff12"];
    return colors[Math.floor(Math.random() * colors.length)];
}

async function send() {

    let input = document.getElementById("msg");
    let chat = document.getElementById("chat");

    if (!input.value) return;

    chat.innerHTML += `<div class="msg user">${input.value}</div>`;

    let text = input.value;
    input.value = "";

    let res = await fetch("http://127.0.0.1:8000/chat", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({message: text})
    });

    let data = await res.json();

    chat.innerHTML += `
        <div class="msg bot" style="border-left:5px solid ${randomBorder()}">
            ${data.reply}
        </div>
    `;

    chat.scrollTop = chat.scrollHeight;
}

/* ENTER */
document.getElementById("msg").addEventListener("keydown", function(e) {
    if (e.key === "Enter") send();
});

</script>

</body>
</html>
