<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meseleney</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>

<body>

    <!-- Arka Plan -->
    <div class="background"></div>
    <div class="fog"></div>

    <!-- Sol Üst Logo -->
    <header class="logo">
        <h1>Meseleney</h1>
        <p>Zindanın en konuşkan mahkûmu...</p>
    </header>

    <!-- Chat Paneli -->
    <section class="chat-panel">

        <main id="chat"></main>

        <footer>

            <input
                id="message"
                type="text"
                placeholder="Meseleni anlat..."
                autocomplete="off"
            >

            <button id="send">
                Gönder
            </button>

        </footer>

    </section>

    <script src="script.js"></script>

</body>
</html>
